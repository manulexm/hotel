<!DOCTYPE html> <!--isso diz que o html é para intendificar que é a versao 5 do html-->
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8"><!--permiti caracteris especiais-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- isso faz com que quanto estiver  em outro tipo de aparelho como celular tablets entre outros se modifica no formdo do aparelho-->
    <title>Cadastro</title>
</head>
<body>
<form id="formCadastro">
<div>
    <div>
        <label> Nome:</label>
        <input type="text" name="nome" required> <!--o required serve para ser obricatorio escrever o nome ai-->
    </div>
</div>
<div>
    <div>
        <label> CPF:</label>
        <input type="text" name="CPF" required>
    </div>
</div>
<div>
    <div>
        <label> Email:</label>
        <input type="email" name="Email" required>
    </div>
</div>
<div>
    <div>
        <label> telefone:</label>
        <input type="text" name="telefone" required>
    </div>
</div>
<div>
    <div>
        <label> endereço:</label>
        <input type="text" name="endereço" required>
    </div>
</div>
<div>
    <div>
        <label> observaçao:</label>
        <textarea type="text" name="observaçao" required>
    </div>
</div>
<div>
    <button type="submit">enviar</button>
</div>

</form>
</body>
</html>
